services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fincredit_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fincredit_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APP_NAME: FinCredit AI
      APP_ENV: development
      API_PREFIX: /api
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fincredit_ai
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      JWT_SECRET_KEY: local-docker-demo-secret-change-before-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      DEMO_USER_EMAIL: demo@fincredit.ai
      DEMO_USER_PASSWORD: DemoPass123!
      ADMIN_USER_EMAIL: admin@fincredit.ai
      ADMIN_USER_PASSWORD: AdminPass123!
      OLLAMA_MODEL: llama3.1:8b
      LLM_TIMEOUT_SECONDS: "20"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

volumes:
  postgres_data:
